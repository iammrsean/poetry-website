<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <g clip-path="url(#circle)">
    <!-- moon -->
    <circle cx="148" cy="48" r="22" fill="#fffde7" opacity="0.9"/>
    <circle cx="148" cy="48" r="32" fill="#fff9c4" opacity="0.15"/>
    <!-- figure silhouette -->
    <ellipse cx="100" cy="108" rx="18" ry="22" fill="#c8a96e" opacity="0.9"/>
    <ellipse cx="100" cy="82" rx="13" ry="13" fill="#d4a96e"/>
    <!-- robe -->
    <path d="M72 130 Q100 160 128 130 L120 200 L80 200 Z" fill="#8ba0c8" opacity="0.7"/>
    <path d="M82 130 Q100 155 118 130" fill="none" stroke="#6080b0" stroke-width="1.5" opacity="0.5"/>
    <!-- wine cup -->
    <path d="M112 112 L116 120 L108 120 Z" fill="#e8c060"/>
    <!-- ground -->
    <rect x="0" y="175" width="200" height="25" fill="#0a1008" opacity="0.6"/>
    <!-- stars -->
    <circle cx="40" cy="35" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="60" cy="20" r="1" fill="white" opacity="0.6"/>
    <circle cx="170" cy="70" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="25" cy="60" r="1" fill="white" opacity="0.5"/>
    <circle cx="80" cy="25" r="1.5" fill="white" opacity="0.7"/>
    <!-- name label -->
    <rect x="0" y="155" width="200" height="45" fill="rgba(0,0,0,0.45)"/>
    <text x="100" y="174" font-family="serif" font-size="20" fill="#ffe082" text-anchor="middle" letter-spacing="4">李白</text>
    <text x="100" y="192" font-family="serif" font-size="11" fill="rgba(255,220,130,0.7)" text-anchor="middle" letter-spacing="2">诗仙 · 唐</text>
  </g>
</svg>
