<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c8e6f5"/>
      <stop offset="100%" stop-color="#81b8d0"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <g clip-path="url(#circle)">
    <!-- sky glow -->
    <circle cx="150" cy="30" r="40" fill="#fff9c4" opacity="0.5"/>
    <!-- mountains -->
    <path d="M0 140 L50 80 L100 130 L150 70 L200 120 L200 200 L0 200Z" fill="#5a8fa0" opacity="0.5"/>
    <path d="M0 155 L60 100 L110 145 L160 90 L200 135 L200 200 L0 200Z" fill="#3a6070" opacity="0.6"/>
    <!-- figure -->
    <ellipse cx="100" cy="115" rx="16" ry="20" fill="#c8a96e"/>
    <ellipse cx="100" cy="90" rx="12" ry="12" fill="#d4a96e"/>
    <!-- green robe -->
    <path d="M75 132 Q100 162 125 132 L118 200 L82 200 Z" fill="#6aaf7a" opacity="0.85"/>
    <!-- birds -->
    <path d="M60 55 Q65 50 70 55" fill="none" stroke="#2a4a5a" stroke-width="1.5"/>
    <path d="M80 45 Q85 40 90 45" fill="none" stroke="#2a4a5a" stroke-width="1.5"/>
    <!-- name label -->
    <rect x="0" y="155" width="200" height="45" fill="rgba(20,60,80,0.55)"/>
    <text x="100" y="174" font-family="serif" font-size="18" fill="#e8f5e9" text-anchor="middle" letter-spacing="3">孟浩然</text>
    <text x="100" y="192" font-family="serif" font-size="11" fill="rgba(200,240,210,0.75)" text-anchor="middle" letter-spacing="2">山水 · 唐</text>
  </g>
</svg>
